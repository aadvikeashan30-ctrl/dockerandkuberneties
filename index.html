<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Code Origin.AI — an interactive, visual DevOps trainer for Docker & Kubernetes." />
  <title>Code Origin.AI · Interactive DevOps Trainer</title>
  <link rel="preconnect" href="data:," />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <!-- Animated background layers -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <!-- Mobile top bar -->
  <header class="topbar">
    <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="topbar-brand">
      <span class="brand-mark">⚡</span>
      <span class="brand-name">Code&nbsp;Origin<span class="brand-ai">.AI</span></span>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo">⚡</div>
        <div class="brand-text">
          <div class="brand-name">Code&nbsp;Origin<span class="brand-ai">.AI</span></div>
          <div class="brand-tag">DevOps Learning Dashboard</div>
        </div>
      </div>

      <nav class="nav" id="nav">
        <div class="nav-section-label">Learn</div>
        <a class="nav-item" data-view="home" href="#home">
          <span class="nav-ico">🏠</span><span>Overview</span>
        </a>
        <a class="nav-item" data-view="docker" href="#docker">
          <span class="nav-ico">🐳</span><span>Docker Fundamentals</span>
        </a>
        <a class="nav-item" data-view="kubernetes" href="#kubernetes">
          <span class="nav-ico">☸️</span><span>Kubernetes Architecture</span>
        </a>
        <a class="nav-item" data-view="yaml" href="#yaml">
          <span class="nav-ico">📄</span><span>YAML Explorer</span>
        </a>
        <a class="nav-item" data-view="architecture" href="#architecture">
          <span class="nav-ico">🗺️</span><span>Architecture View</span>
        </a>

        <div class="nav-section-label">Practice</div>
        <a class="nav-item" data-view="playground" href="#playground">
          <span class="nav-ico">🧪</span><span>Playground</span>
        </a>
        <a class="nav-item" data-view="builder" href="#builder">
          <span class="nav-ico">🧩</span><span>Diagram Builder</span>
        </a>
        <a class="nav-item" data-view="interview" href="#interview">
          <span class="nav-ico">🎯</span><span>Interview Q&amp;A</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="progress-ring" id="progressRing">
          <span id="progressPct">0%</span>
        </div>
        <div class="sidebar-foot-text">
          <strong>Your journey</strong>
          <small>Beginner → Advanced</small>
        </div>
      </div>
    </aside>

    <div class="scrim" id="scrim"></div>

    <!-- Main content -->
    <main class="content" id="content" tabindex="-1">
      <!-- views injected here -->
    </main>
  </div>

  <!-- Global tooltip element -->
  <div class="floating-tip" id="floatingTip" role="tooltip" aria-hidden="true"></div>

  <script src="js/data.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
